[workspace]
name              = "nf-chain"
version           = "0.1.0"
description       = "Generate chain files for liftovers."
authors           = ["CormacKinsella <27350062+CormacKinsella@users.noreply.github.com>"]
channels          = ["conda-forge", "bioconda"]
platforms         = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
nextflow          = ">=26.4.1,<27"
nf-core           = ">=4.0.2,<5"

[tasks]
help              = "nextflow main.nf --help"
test-chain        = "nextflow main.nf -profile apptainer,test   -params-file tests/params-chain.yml"
test-lift         = "nextflow main.nf -profile apptainer,test   -params-file tests/params-lift.yml"
test-full         = "nextflow main.nf -profile apptainer,test   -params-file tests/params-chain-lift.yml"
test-singularity  = "nextflow main.nf -profile singularity,test -params-file tests/params-chain-lift.yml"
test-docker       = "nextflow main.nf -profile docker,test      -params-file tests/params-chain-lift.yml"

[activation.env]
NXF_SYNTAX_PARSER = "v1"
